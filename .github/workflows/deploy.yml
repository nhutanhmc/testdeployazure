name: Build and Deploy to Azure

on:
  push:
    branches:
      - main # Chạy tự động khi push code lên nhánh main
  workflow_dispatch: # Cho phép trigger bằng tay trên giao diện GitHub

env:
  REGISTRY_LOGIN_SERVER: xavia.azurecr.io
  IMAGE_NAME: xavia-backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Login to Azure Container Registry (ACR)
        uses: azure/docker-login@v2
        with:
          login-server: ${{ env.REGISTRY_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and Push Docker image
        run: |
          # Build image và gắn 2 tag: tag theo mã commit (để versioning) và tag latest
          docker build -t ${{ env.REGISTRY_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }} -t ${{ env.REGISTRY_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest .
          
          # Push toàn bộ tags lên ACR
          docker push ${{ env.REGISTRY_LOGIN_SERVER }}/${{ env.IMAGE_NAME }} --all-tags

  deploy-to-app-service:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'xavia' # Tên App Service của bạn
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: '${{ env.REGISTRY_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}'